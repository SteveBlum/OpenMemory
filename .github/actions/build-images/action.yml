name: "build-images"
description: "Builds and pushes Docker images for a given tag and creates a fork release"

inputs:
  tag:
    required: true
    description: "Tag to build images for"
  token:
    required: true
    description: "GitHub token for GHCR login and release creation"

runs:
  using: composite
  steps:
    - name: Set lowercase owner
      id: owner
      shell: bash
      run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

    - name: Mount tag commit as worktree
      shell: bash
      run: git worktree add /tmp/build-context "refs/tags/${{ inputs.tag }}"

    - name: Check build contexts
      id: ctx
      shell: bash
      run: |
        [ -d /tmp/build-context/dashboard ] && echo "dashboard=true" >> $GITHUB_OUTPUT || echo "dashboard=false" >> $GITHUB_OUTPUT
        [ -d /tmp/build-context/packages/openmemory-js ] && echo "js=true" >> $GITHUB_OUTPUT || echo "js=false" >> $GITHUB_OUTPUT
        [ -d /tmp/build-context/backend ] && echo "backend=true" >> $GITHUB_OUTPUT || echo "backend=false" >> $GITHUB_OUTPUT

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.token }}

    - name: Build and push Dashboard image
      if: steps.ctx.outputs.dashboard == 'true'
      uses: docker/build-push-action@v6
      with:
        context: /tmp/build-context/dashboard
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ghcr.io/${{ steps.owner.outputs.value }}/openmemory:dashboard-${{ inputs.tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push JS backend image
      if: steps.ctx.outputs.js == 'true'
      uses: docker/build-push-action@v6
      with:
        context: /tmp/build-context/packages/openmemory-js
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ghcr.io/${{ steps.owner.outputs.value }}/openmemory:js-${{ inputs.tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push backend image
      if: steps.ctx.outputs.backend == 'true'
      uses: docker/build-push-action@v6
      with:
        context: /tmp/build-context/backend
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ghcr.io/${{ steps.owner.outputs.value }}/openmemory:backend-${{ inputs.tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Remove worktree
      shell: bash
      run: git worktree remove /tmp/build-context

    - name: Create fork release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        TAG=${{ inputs.tag }}
        OWNER=${{ steps.owner.outputs.value }}
        REPO=${{ github.event.repository.name }}
        BODY="Upstream release: https://github.com/CaviraOSS/OpenMemory/releases/tag/$TAG"
        STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" \
          -H "Authorization: token $GH_TOKEN" \
          "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG" || true)
        if [ "$STATUS" = "200" ]; then
          ID=$(curl -sSL -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG" | jq -r .id)
          jq -n --arg body "$BODY" '{"body":$body}' | \
            curl -sSL -X PATCH \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d @- \
              "https://api.github.com/repos/$OWNER/$REPO/releases/$ID" || true
        else
          jq -n --arg tag "$TAG" --arg name "$TAG" --arg body "$BODY" \
            '{"tag_name":$tag,"name":$name,"body":$body,"draft":false,"prerelease":false}' | \
            curl -sSL -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d @- \
              "https://api.github.com/repos/$OWNER/$REPO/releases" || true
        fi
